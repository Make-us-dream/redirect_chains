  <title>Redirect Chains Test</title>

<body>
  <h1>Redirect Chains Test</h1>
  <p>
    On Cloudflare Pages, <code>_redirects</code> forces
    <code>/</code> → <code>/a</code> → <code>/b</code> → <code>/done</code>.
  </p>
  <p>
    If you see this page with status 200, the forced redirects are not applied.
    Try opening <a href="/done">/done</a> for the final page.
  </p>
</body>
</html>
